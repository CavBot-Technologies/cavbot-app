name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PREBUNDLE_WORKER: "1"
      # Build-only placeholders so prisma generate can run in CI without DB credentials.
      # The migration step below overrides these with production secrets.
      DATABASE_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
      DIRECT_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
      # Official production app origin used for URL generation during build.
      CAVBOT_APP_ORIGIN: https://app.cavbot.io
      APP_URL: https://app.cavbot.io
      NEXT_PUBLIC_APP_ORIGIN: https://app.cavbot.io
      NEXT_PUBLIC_APP_URL: https://app.cavbot.io
      NEXT_PUBLIC_WIDGET_CONFIG_ORIGIN: https://app.cavbot.io
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_live_51SsIgA0H03R4PCfTE71vHIXAcwrTiXITwassSUpLsl7aMn4HmpcstFXO6tCi2FxCXClrPPQcUMHN6Af4NEDtPhLo00XiNpm18i
      ALLOWED_ORIGINS: https://app.cavbot.io
      # Required during build because middleware validates signed session cookies.
      CAVBOT_SESSION_SECRET: ${{ secrets.CAVBOT_SESSION_SECRET }}
      # Optional security secret for CavAi external share tokens.
      CAVAI_SHARE_TOKEN_SECRET: ${{ secrets.CAVAI_SHARE_TOKEN_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Apply Prisma Migrations
        env:
          MIGRATE_DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL || secrets.DATABASE_URL }}
          MIGRATE_DIRECT_URL: ${{ secrets.MIGRATE_DIRECT_URL || secrets.DIRECT_URL }}
        run: |
          export DATABASE_URL="${MIGRATE_DATABASE_URL:-}"
          export DIRECT_URL="${MIGRATE_DIRECT_URL:-}"
          DATABASE_URL="${DATABASE_URL#\"}"
          DATABASE_URL="${DATABASE_URL%\"}"
          DIRECT_URL="${DIRECT_URL#\"}"
          DIRECT_URL="${DIRECT_URL%\"}"
          if [ -z "$DATABASE_URL" ] && [ -z "$DIRECT_URL" ]; then
            echo "::error title=Missing database deploy secret::Set production secret MIGRATE_DIRECT_URL (preferred) or MIGRATE_DATABASE_URL for Deploy Cloudflare."
            exit 1
          fi
          export DATABASE_URL="${DATABASE_URL:-$DIRECT_URL}"
          export DIRECT_URL="${DIRECT_URL:-$DATABASE_URL}"
          case "$DATABASE_URL" in
            *"placeholder@127.0.0.1:5432/cavbot"*|*"paste_your_base_url_here"*)
              echo "::error title=Invalid migrate DATABASE_URL::Deploy Cloudflare is using a placeholder database URL. Set MIGRATE_DATABASE_URL or MIGRATE_DIRECT_URL to the real production Postgres endpoint reachable from GitHub Actions."
              exit 1
              ;;
          esac
          case "$DIRECT_URL" in
            *"placeholder@127.0.0.1:5432/cavbot"*|*"paste_your_base_url_here"*)
              echo "::error title=Invalid migrate DIRECT_URL::Deploy Cloudflare is using a placeholder direct database URL. Set MIGRATE_DIRECT_URL to the real production direct Postgres endpoint reachable from GitHub Actions."
              exit 1
              ;;
          esac
          npx prisma migrate deploy

      - name: Verify Cloudflare Auth
        run: npx -y wrangler@3.114.0 whoami

      - name: Validate Auth Build Secrets
        run: |
          if [ -z "${CAVBOT_SESSION_SECRET:-}" ] || [ "${CAVBOT_SESSION_SECRET}" = "paste_your_secret_here" ]; then
            echo "::error title=Missing session secret::Set production secret CAVBOT_SESSION_SECRET for Deploy Cloudflare so middleware can validate auth cookies."
            exit 1
          fi

      - name: Ensure OpenNext Config Exists
        run: |
          if [ ! -f open-next.config.ts ]; then
            cat > open-next.config.ts <<'EOF'
          import { defineCloudflareConfig } from "@opennextjs/cloudflare/config";

          export default defineCloudflareConfig();
          EOF
          fi
          ls -la open-next.config.ts

      - name: Build OpenNext For Cloudflare
        run: npm run build:cloudflare

      - name: Prepare Pages Bundle
        run: |
          npm run prepare:cloudflare:pages
          test -z "$(find .open-next/pages-deploy -type f -size +25M -print)"
          ls -la .open-next/pages-deploy | sed -n '1,80p'

      - name: Deploy To Cloudflare Pages
        run: npx -y wrangler@3.114.0 pages deploy .open-next/pages-deploy --project-name cavbot-app --branch main --commit-dirty=false --no-bundle
