name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Build-only placeholders so prisma generate can run in CI without DB credentials.
      DATABASE_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
      DIRECT_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build OpenNext For Cloudflare
        run: npm run build:cloudflare

      - name: Deploy To Cloudflare
        run: npm run deploy:cloudflare
