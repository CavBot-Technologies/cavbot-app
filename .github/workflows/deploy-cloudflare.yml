name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Build-only placeholders so prisma generate can run in CI without DB credentials.
      DATABASE_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
      DIRECT_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
      # Official production app origin used for URL generation during build.
      CAVBOT_APP_ORIGIN: https://app.cavbot.io
      APP_URL: https://app.cavbot.io
      NEXT_PUBLIC_APP_URL: https://app.cavbot.io
      ALLOWED_ORIGINS: https://app.cavbot.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Ensure OpenNext Config Exists
        run: |
          if [ ! -f open-next.config.ts ]; then
            cat > open-next.config.ts <<'EOF'
          import { defineCloudflareConfig } from "@opennextjs/cloudflare/config";

          export default defineCloudflareConfig();
          EOF
          fi
          ls -la open-next.config.ts

      - name: Build OpenNext For Cloudflare
        run: npm run build:cloudflare

      - name: Prepare Pages Bundle
        run: |
          rm -rf .open-next/pages-deploy
          mkdir -p .open-next/pages-deploy
          cp .open-next/worker.js .open-next/pages-deploy/_worker.js
          cp -R .open-next/assets/. .open-next/pages-deploy/
          ls -la .open-next/pages-deploy | sed -n '1,80p'

      - name: Deploy To Cloudflare Pages
        run: npx wrangler pages deploy .open-next/pages-deploy --project-name cavbot-app --branch main
