name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PREBUNDLE_WORKER: "1"
      # Build-only placeholders so prisma generate can run in CI without DB credentials.
      DATABASE_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
      DIRECT_URL: postgresql://cavbot:placeholder@127.0.0.1:5432/cavbot
      # Official production app origin used for URL generation during build.
      CAVBOT_APP_ORIGIN: https://app.cavbot.io
      APP_URL: https://app.cavbot.io
      NEXT_PUBLIC_APP_URL: https://app.cavbot.io
      ALLOWED_ORIGINS: https://app.cavbot.io
      # Optional security secret for CavAi external share tokens.
      CAVAI_SHARE_TOKEN_SECRET: ${{ secrets.CAVAI_SHARE_TOKEN_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Verify Cloudflare Auth
        run: npx -y wrangler@3.114.0 whoami

      - name: Ensure OpenNext Config Exists
        run: |
          if [ ! -f open-next.config.ts ]; then
            cat > open-next.config.ts <<'EOF'
          import { defineCloudflareConfig } from "@opennextjs/cloudflare/config";

          export default defineCloudflareConfig();
          EOF
          fi
          ls -la open-next.config.ts

      - name: Build OpenNext For Cloudflare
        run: npm run build:cloudflare

      - name: Prepare Pages Bundle
        run: |
          npm run prepare:cloudflare:pages
          test -z "$(find .open-next/pages-deploy -type f -size +25M -print)"
          ls -la .open-next/pages-deploy | sed -n '1,80p'

      - name: Deploy To Cloudflare Pages
        run: npx -y wrangler@3.114.0 pages deploy .open-next/pages-deploy --project-name cavbot-app --branch main --commit-dirty=false --no-bundle
