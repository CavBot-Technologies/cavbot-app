name = "cavbot-analytics"
main = "src/index.js"
compatibility_date = "2026-01-04"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# D1 binding (change database_name / id to your real one)
[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "cavbot-analytics-db"
database_id = "9ec63140-5ffe-43d9-aeec-08c6c16a5336"

[vars]
# Non-secret
ALLOWED_ORIGINS = "https://app.cavbot.io,https://cavbot.io,https://www.cavbot.io"

# Optional dev bypass (only if you want it)
# CAVBOT_DEV_NO_ADMIN = "1"

[[durable_objects.bindings]]
name = "RL"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiter"]
